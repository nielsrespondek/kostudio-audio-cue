name: Build Windows + Stream Deck

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Build Windows portable .exe
        run: npm run dist-win

      - name: Build Stream Deck plugin
        run: npm run dist-streamdeck

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            dist/*.exe
            dist/*.streamDeckPlugin
          retention-days: 7

  publish-release:
    needs: [build-windows]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Determine release tag
        id: version
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=v$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"
          fi

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: release-files

      - name: Write release notes
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          cat > /tmp/release-notes.md << NOTES
          ## Kostudio Audio Cue ${TAG}

          Windows: Download Kostudio-Audio-Cue-x64.exe — portable, no install required.
          Stream Deck: Download Kostudio-Audio-Cue.streamDeckPlugin and double-click to install.
          NOTES

      - name: Publish versioned release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          gh release delete "$TAG" --yes --repo ${{ github.repository }} 2>/dev/null || true
          gh release create "$TAG" release-files/* \
            --repo ${{ github.repository }} \
            --title "Kostudio Audio Cue ${TAG}" \
            --notes-file /tmp/release-notes.md
